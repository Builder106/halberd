version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
  settings:
    gosec:
      excludes:
        - G304  # file inclusion via variable (intentional in policy.LoadBundle)

formatters:
  enable:
    - gofmt
    - goimports
