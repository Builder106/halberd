run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec

linters-settings:
  gosec:
    excludes:
      - G304  # file inclusion via variable (intentional in policy.LoadBundle)
