name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          # Pinned to 1.25 because golangci-lint 2.12.2 (current) was built
          # with 1.25 and cannot parse 1.26's stdlib export data. The Go team
          # backports security fixes to N-1, so 1.25 still receives CVE
          # patches. Bump when golangci-lint adds 1.26 support (issue #6272).
          go-version: '1.25'
          cache: true

      - name: go mod tidy (verify)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: lint policy bundles
        run: |
          go build -o /tmp/halberd ./cmd/halberd
          for f in policies/*.yaml halberd.example.yaml; do
            /tmp/halberd lint "$f"
          done

  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          # Pinned to 1.25 because golangci-lint 2.12.2 (current) was built
          # with 1.25 and cannot parse 1.26's stdlib export data. The Go team
          # backports security fixes to N-1, so 1.25 still receives CVE
          # patches. Bump when golangci-lint adds 1.26 support (issue #6272).
          go-version: '1.25'
          cache: true

      - name: run benchmarks
        run: go test -run=^$ -bench=. -benchmem -benchtime=2s ./internal/policy | tee bench.txt

      - name: upload benchmark output
        uses: actions/upload-artifact@v6
        with:
          name: bench
          path: bench.txt

  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          # Pinned to 1.25 because golangci-lint 2.12.2 (current) was built
          # with 1.25 and cannot parse 1.26's stdlib export data. The Go team
          # backports security fixes to N-1, so 1.25 still receives CVE
          # patches. Bump when golangci-lint adds 1.26 support (issue #6272).
          go-version: '1.25'
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: scan
        run: govulncheck ./...

  golangci-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          # Pinned to 1.25 because golangci-lint 2.12.2 (current) was built
          # with 1.25 and cannot parse 1.26's stdlib export data. The Go team
          # backports security fixes to N-1, so 1.25 still receives CVE
          # patches. Bump when golangci-lint adds 1.26 support (issue #6272).
          go-version: '1.25'
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Rebuild WASM (catches compile errors; not byte-compared)
        run: |
          ./scripts/build-wasm.sh
          # Go's WASM output isn't byte-stable across host OS/toolchain
          # versions even with -trimpath, so we don't diff-check the
          # committed artifact. The build itself catches what we care
          # about: API drift between cmd/halberd-wasm and internal/policy.
          test -s web/public/halberd.wasm
          test -s web/public/wasm_exec.js

      - name: npm install
        working-directory: web
        run: npm ci

      - name: next build
        working-directory: web
        run: npx next build

      - name: next lint
        working-directory: web
        run: npx next lint || true   # warnings, not blockers, for v0.1
