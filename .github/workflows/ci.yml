name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: go mod tidy (verify)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: lint policy bundles
        run: |
          go build -o /tmp/halberd ./cmd/halberd
          for f in policies/*.yaml halberd.example.yaml; do
            /tmp/halberd lint "$f"
          done

  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: run benchmarks
        run: go test -run=^$ -bench=. -benchmem -benchtime=2s ./internal/policy | tee bench.txt

      - name: upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.txt

  govulncheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: scan
        run: govulncheck ./...

  golangci-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
