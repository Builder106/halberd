name: Release

on:
  push:
    tags: ['v*']

permissions:
  # Required to create GitHub Releases and upload archive assets.
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          # goreleaser's changelog block walks `git log` between tags, so
          # it needs full history rather than the default shallow clone.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
